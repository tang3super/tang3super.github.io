<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #f5f5f5;
  color: #1a1a1a;
  padding: 20px;
  max-width: 760px;
  margin: 0 auto;
}
h1 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #111;
}
.subtitle {
  font-size: 13px;
  color: #888;
  margin-bottom: 20px;
}
/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.tab {
  padding: 8px 16px;
  border: 1px solid #ddd;
  border-radius: 24px;
  background: #fff;
  color: #555;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.tab:hover:not(.on) { border-color: #aaa; color: #111; }
.tab.on { background: #111; color: #fff; border-color: #111; }
/* Trigger card */
.trigger-card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 16px;
}
.badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 500;
}
.b-driver { background: #eff6ff; color: #1d4ed8; }
.b-lag { background: #f9f9f9; color: #888; border: 1px solid #e5e5e5; }
.trigger-text { font-size: 14px; color: #222; line-height: 1.65; }
/* Chain */
.section-label {
  font-size: 11px;
  font-weight: 500;
  color: #999;
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.chain-wrap { margin-bottom: 16px; }
.chain-step { display: flex; }
.step-spine {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 28px;
  flex-shrink: 0;
}
.step-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  margin-top: 12px;
  flex-shrink: 0;
}
.step-line {
  width: 1px;
  flex: 1;
  min-height: 18px;
  background: #e0e0e0;
  margin-top: 3px;
}
.step-body { padding: 8px 0 12px 8px; flex: 1; }
.step-lbl { font-size: 10px; color: #aaa; letter-spacing: .5px; margin-bottom: 2px; font-weight: 500; }
.step-desc { font-size: 13px; color: #222; line-height: 1.55; }
/* Impact grid */
.impact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.impact-card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 10px;
  padding: 12px 14px;
}
.asset-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.asset-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: #f5f5f5;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.asset-name { font-size: 13px; font-weight: 500; color: #111; }
.direction { font-size: 17px; font-weight: 600; margin-bottom: 4px; letter-spacing: -1px; }
.dir-pos { color: #16a34a; }
.dir-neg { color: #dc2626; }
.dir-neu { color: #aaa; }
.impact-note { font-size: 11px; color: #777; line-height: 1.45; }
/* Insight */
.insight {
  border-radius: 10px;
  padding: 14px 16px;
  border-left: 3px solid;
  margin-bottom: 4px;
}
.insight.alpha { background: #eff6ff; border-left-color: #2563eb; }
.insight.warn  { background: #fffbeb; border-left-color: #d97706; }
.insight-label {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 5px;
}
.insight.alpha .insight-label { color: #1d4ed8; }
.insight.warn  .insight-label { color: #92400e; }
.insight-body { font-size: 13px; color: #222; line-height: 1.65; }
/* Matrix */
.matrix-section {
  margin-top: 28px;
  border-top: 1px solid #e5e5e5;
  padding-top: 20px;
}
.matrix-title {
  font-size: 11px;
  color: #aaa;
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.mtx { width: 100%; border-collapse: collapse; font-size: 13px; }
.mtx th {
  font-size: 11px;
  font-weight: 500;
  color: #999;
  padding: 7px 10px;
  text-align: center;
  border-bottom: 1px solid #e5e5e5;
}
.mtx th:first-child { text-align: left; }
.mtx td {
  padding: 9px 10px;
  text-align: center;
  border-bottom: 1px solid #f0f0f0;
  color: #555;
}
.mtx td:first-child { text-align: left; font-size: 13px; color: #222; font-weight: 500; }
.mtx tr:last-child td { border-bottom: none; }
.mp { color: #16a34a; font-weight: 600; }
.mn { color: #dc2626; font-weight: 600; }
.mm { color: #aaa; }
/* Footer */
.footer {
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid #e5e5e5;
  font-size: 12px;
  color: #aaa;
  text-align: center;
}
@media (max-width: 500px) {
  .impact-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>跨资产宏观传导框架</h1>
<p class="subtitle">Cross-Asset Macro Transmission Framework · SUPER爱投资</p>

<div class="tabs">
  <button class="tab on" data-id="fed_hike" onclick="go('fed_hike')">美联储加息</button>

<div id="sc"></div>

<div class="matrix-section">

<script>

    ],
    insight:{type:'warn', label:'注意陷阱', text:'"预防性降息"（软着陆）和"危机降息"（衰退）是两种完全不同的信号。后者即便降息，股市仍可能继续跌6-12个月，需区分背景'}
  },
  {
    id:'carry', title:'日元套息崩解', driver:'汇率 × 货币政策', lag:'数小时 → 数周（急速传导）', color:'#993C1D',
    trigger:'日本央行意外加息，或日元对美元单日升值超1.5%，触发全球套息平仓',

    ],
    impacts:[
      {asset:'美股', icon:'📈', dir:-3, note:'系统性抛售，AI/科技股首当其冲'},

function dirHTML(v) {
  const c = v > 0 ? 'dir-pos' : v < 0 ? 'dir-neg' : 'dir-neu';
  const s = v >= 3 ? '▲▲▲' : v === 2 ? '▲▲' : v === 1 ? '▲' : v === 0 ? '→' : v === -1 ? '▼' : v === -2 ? '▼▼' : '▼▼▼';
  return `<span class="direction ${c}">${s}</span>`;
}

function go(id) {
  const s = D.find(x => x.id === id);
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.id === id));

  const chain = s.chain.map((c, i) => `
    <div class="chain-step">
      <div class="step-spine">
        <div class="step-dot" style="background:${s.color}"></div>
        ${i < s.chain.length - 1 ? '<div class="step-line"></div>' : ''}
      </div>
      <div class="step-body">
        <div class="step-lbl">${c.lbl}</div>
        <div class="step-desc">${c.text}</div>
      </div>
    </div>`).join('');

  const impacts = s.impacts.map(im => `
    <div class="impact-card">
      <div class="asset-row">
        <div class="asset-icon">${im.icon}</div>
        <span class="asset-name">${im.asset}</span>
      </div>
      ${dirHTML(im.dir)}
      <div class="impact-note">${im.note}</div>
    </div>`).join('');

  document.getElementById('sc').innerHTML = `
    <div class="trigger-card">
      <div class="badges">
        <span class="badge b-driver">${s.driver}</span>
        <span class="badge b-lag">⏱ ${s.lag}</span>
      </div>
      <div class="trigger-text">${s.trigger}</div>
    </div>
    <div class="section-label">传导链条</div>
    <div class="chain-wrap">${chain}</div>
    <div class="section-label">资产影响</div>
    <div class="impact-grid">${impacts}</div>
    <div class="insight ${s.insight.type}">
      <div class="insight-label">【${s.insight.label}】</div>
      <div class="insight-body">${s.insight.text}</div>
    </div>`;
}

go('fed_hike');
</script>
